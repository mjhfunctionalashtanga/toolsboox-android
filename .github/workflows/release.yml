name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Prod
    permissions:
      contents: write
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build prod release APK
        run: ./gradlew assembleProdRelease

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/prod/release/toolboox-prod-release-*.apk \
             vibook-planner-${{ steps.tag.outputs.name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ViBook Planner ${{ steps.tag.outputs.name }}
          body: |
            ViBook Planner release ${{ steps.tag.outputs.name }}.

            **Installation:** Download the APK below and sideload it to your Boox device.

            See the [README](https://github.com/${{ github.repository }}/blob/main/docs/README.md) for setup instructions.
          draft: false
          prerelease: false
          generate_release_notes: true
          files: vibook-planner-${{ steps.tag.outputs.name }}.apk
